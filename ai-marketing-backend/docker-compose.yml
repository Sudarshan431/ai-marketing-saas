services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-marketing-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai-marketing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-marketing-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai-marketing}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pass123}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-secret-at-least-32-characters}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://host.docker.internal:8000}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
